name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract tag version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MOD_VERSION="${TAG#v}"

          if [ "$TAG" = "$MOD_VERSION" ] || [ -z "$MOD_VERSION" ]; then
            echo "Release tags must use the v<version> format." >&2
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "MOD_VERSION=$MOD_VERSION" >> "$GITHUB_ENV"
          echo "ASSET_NAME=tauth-$MOD_VERSION.jar" >> "$GITHUB_ENV"

      - name: Build plugin
        run: ./gradlew -PmodVersion="${MOD_VERSION}" build

      - name: Prepare release asset
        run: |
          SOURCE_JAR="build/libs/tauth-${MOD_VERSION}.jar"

          if [ ! -f "$SOURCE_JAR" ]; then
            echo "Expected build artifact not found: $SOURCE_JAR" >&2
            exit 1
          fi

          if ! unzip -p "$SOURCE_JAR" META-INF/mods.toml | grep -F "version=\"$MOD_VERSION\""; then
            echo "Built mod metadata does not contain version=\"$MOD_VERSION\"." >&2
            exit 1
          fi

          cp "$SOURCE_JAR" "$ASSET_NAME"
          SHA256="$(sha256sum "$ASSET_NAME" | cut -d ' ' -f 1)"

          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          printf '%s  %s\n' "$SHA256" "$ASSET_NAME" > release-sha256.txt

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes ""
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "$ASSET_NAME" --clobber

      - name: Append release hash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_BODY="$(mktemp)"
          UPDATED_BODY="$(mktemp)"

          gh release view "$TAG" --json body --jq .body > "$CURRENT_BODY"
          awk '
            /^# Release Hash$/ { exit }
            { lines[NR] = $0 }
            END {
              last = NR
              while (last > 0 && lines[last] == "") last--
              for (i = 1; i <= last; i++) print lines[i]
            }
          ' "$CURRENT_BODY" > "$UPDATED_BODY"

          if [ -s "$UPDATED_BODY" ]; then
            printf '\n\n' >> "$UPDATED_BODY"
          fi

          {
            printf '# Release Hash\n\n'
            printf -- '- `%s`: `%s`\n' "$ASSET_NAME" "$SHA256"
          } >> "$UPDATED_BODY"

          gh release edit "$TAG" --notes-file "$UPDATED_BODY"
